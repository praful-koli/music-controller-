    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body>
    <main>
        <div class="container">
            <div class="artist-img"></div>
            <div class="title">

                <div class="music-range" >

            </div>
        </div>
